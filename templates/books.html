{% extends "base.html" %}

{% block title %}Books{% endblock %}

{% block content %}
<h1>Available Books</h1>

<table border="1" cellpadding="10">
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Price ₹</th>
    </tr>
    {% for book in books %}
    <tr>
        <td>{{ book.title }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.price }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
